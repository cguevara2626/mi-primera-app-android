# Habilitar AndroidX (OBLIGATORIO para Jetpack Compose)
android.useAndroidX=true
android.enableJetifier=true

# Habilitar configuración en caché para compilaciones más rápidas
org.gradle.configuration-cache=true
org.gradle.caching=true

# Aumentar memoria para Gradle (evita errores de "Out of memory")
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# Habilitar configuración paralela (más rápido en multi-core)
org.gradle.parallel=true
